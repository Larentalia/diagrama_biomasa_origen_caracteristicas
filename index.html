<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energía Biomasa — Origen y Características</title>
<style>
  :root {
    --amber-50: #FAEEDA; --amber-400: #BA7517; --amber-800: #633806;
    --green-50: #EAF3DE; --green-600: #7bbe43; --green-800: #27500A;
    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
    --coral-50: #FAECE7; --coral-600: #993C1D; --coral-800: #712B13;
    --purple-50: #EEEDFE; --purple-600: #534AB7; --purple-800: #3C3489;
    --gray-50: #F1EFE8; --gray-400: #888780; --gray-600: #5F5E5A;
    --text: #2C2C2A; --text-s: #5F5E5A;
    --bg: #ffffff;
    --border: rgba(44,44,42,0.15);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --amber-50: #633806; --amber-400: #EF9F27; --amber-800: #FAC775;
      --green-50: #27500A; --green-600: #97C459; --green-800: #C0DD97;
      --teal-50: #085041; --teal-600: #5DCAA5; --teal-800: #9FE1CB;
      --coral-50: #712B13; --coral-600: #F0997B; --coral-800: #F5C4B3;
      --purple-50: #3C3489; --purple-600: #AFA9EC; --purple-800: #CECBF6;
      --gray-50: #444441; --gray-400: #B4B2A9; --gray-600: #D3D1C7;
      --text: #E8E6DC; --text-s: #B4B2A9;
      --bg: #1a1a18;
      --border: rgba(220,218,210,0.15);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }
  header {
    text-align: center;
    margin-bottom: 2rem;
    max-width: 600px;
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: normal;
    letter-spacing: 0.02em;
    color: var(--text);
    margin-bottom: 0.4rem;
  }
  header p {
    font-size: 0.85rem;
    color: var(--text-s);
    font-style: italic;
  }
  .diagram-wrap {
    width: 100%;
    max-width: 720px;
  }
  svg text { font-family: Georgia, serif; }
  .th { font-size: 14px; font-weight: 500; fill: var(--text); }
  .ts { font-size: 12px; font-weight: 400; fill: var(--text-s); }
  .arr { stroke: var(--text-s); stroke-width: 1; fill: none; }

  .n-amber rect  { fill: var(--amber-50); stroke: var(--amber-400); }
  .n-amber .th   { fill: var(--amber-800); }
  .n-amber .ts   { fill: var(--amber-400); }
  .n-green rect  { fill: var(--green-50); stroke: var(--green-600); }
  .n-green .th   { fill: var(--green-800); }
  .n-green .ts   { fill: var(--green-600); }
  .n-teal rect   { fill: var(--teal-50); stroke: var(--teal-600); }
  .n-teal .th    { fill: var(--teal-800); }
  .n-teal .ts    { fill: var(--teal-600); }
  .n-coral rect  { fill: var(--coral-50); stroke: var(--coral-600); }
  .n-coral .th   { fill: var(--coral-800); }
  .n-coral .ts   { fill: var(--coral-600); }
  .n-purple rect { fill: var(--purple-50); stroke: var(--purple-600); }
  .n-purple .th  { fill: var(--purple-800); }
  .n-purple .ts  { fill: var(--purple-600); }

  .n-amber circle { fill: var(--amber-50); stroke: var(--amber-400); }
  .sun-ray { stroke: var(--amber-400); stroke-width: 2; stroke-linecap: round; opacity: 0.7; }

  footer {
    margin-top: 2.5rem;
    font-size: 0.75rem;
    color: var(--text-s);
    text-align: center;
    font-style: italic;
  }
</style>
</head>
<body>
<header>
  <h1>Energía Biomasa</h1>
  <p>Origen y ciclo de conversión energética</p>
</header>

<div class="diagram-wrap">
<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Origen y características de la energía biomasa</title>
  <desc>Diagrama que muestra el ciclo de la biomasa: desde la fotosíntesis solar hasta la obtención de energía y el ciclo del carbono</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Rayos del sol -->
  <g class="sun-ray">
    <line x1="340" y1="8"  x2="340" y2="18"/>
    <line x1="368" y1="14" x2="363" y2="23"/>
    <line x1="389" y1="31" x2="381" y2="37"/>
    <line x1="397" y1="57" x2="387" y2="57"/>
    <line x1="389" y1="83" x2="381" y2="77"/>
    <line x1="368" y1="100" x2="363" y2="91"/>
    <line x1="312" y1="14" x2="317" y2="23"/>
    <line x1="291" y1="31" x2="299" y2="37"/>
    <line x1="283" y1="57" x2="293" y2="57"/>
    <line x1="291" y1="83" x2="299" y2="77"/>
    <line x1="312" y1="100" x2="317" y2="91"/>
  </g>

  <!-- Sol: círculo con ambos textos dentro -->
  <g class="n-amber">
    <circle cx="340" cy="57" r="38" stroke-width="0.5"/>
    <text class="th" x="340" y="51" text-anchor="middle" dominant-baseline="central">Sol</text>
    <text class="ts" x="340" y="67" text-anchor="middle" dominant-baseline="central">Energía radiante</text>
  </g>

  <line x1="340" y1="95" x2="340" y2="122" class="arr" marker-end="url(#arrow)"/>

  <!-- Fotosíntesis -->
  <g class="n-green">
    <rect x="200" y="122" width="280" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="145" text-anchor="middle" dominant-baseline="central">Fotosíntesis</text>
    <text class="ts" x="340" y="163" text-anchor="middle" dominant-baseline="central">CO₂ + H₂O + luz → materia orgánica</text>
  </g>

  <line x1="260" y1="178" x2="130" y2="244" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="178" x2="340" y2="244" class="arr" marker-end="url(#arrow)"/>
  <line x1="420" y1="178" x2="550" y2="244" class="arr" marker-end="url(#arrow)"/>

  <!-- Fuente 1 -->
  <g class="n-teal">
    <rect x="40" y="240" width="170" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="125" y="263" text-anchor="middle" dominant-baseline="central">Residuos</text>
    <text class="ts" x="125" y="281" text-anchor="middle" dominant-baseline="central">forestales y agrícolas</text>
  </g>

  <!-- Fuente 2 -->
  <g class="n-teal">
    <rect x="255" y="240" width="170" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="263" text-anchor="middle" dominant-baseline="central">Cultivos</text>
    <text class="ts" x="340" y="281" text-anchor="middle" dominant-baseline="central">energéticos</text>
  </g>

  <!-- Fuente 3 -->
  <g class="n-teal">
    <rect x="470" y="240" width="170" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="555" y="263" text-anchor="middle" dominant-baseline="central">Residuos</text>
    <text class="ts" x="555" y="281" text-anchor="middle" dominant-baseline="central">orgánicos urbanos</text>
  </g>

  <line x1="125" y1="296" x2="240" y2="360" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="296" x2="340" y2="360" class="arr" marker-end="url(#arrow)"/>
  <line x1="555" y1="296" x2="440" y2="360" class="arr" marker-end="url(#arrow)"/>

  <!-- Procesos de conversión -->
  <g class="n-coral">
    <rect x="150" y="360" width="380" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="383" text-anchor="middle" dominant-baseline="central">Procesos de conversión</text>
    <text class="ts" x="340" y="401" text-anchor="middle" dominant-baseline="central">Combustión · Gasificación · Fermentación · Pirólisis</text>
  </g>

  <line x1="340" y1="416" x2="340" y2="456" class="arr" marker-end="url(#arrow)"/>

  <!-- Energía obtenida -->
  <g class="n-purple">
    <rect x="170" y="456" width="340" height="56" rx="10" stroke-width="0.5"/>
    <text class="th" x="340" y="479" text-anchor="middle" dominant-baseline="central">Energía obtenida</text>
    <text class="ts" x="340" y="497" text-anchor="middle" dominant-baseline="central">Calor · Electricidad · Biocombustibles · Biogás</text>
  </g>

  <!-- Ciclo CO2 -->
  <path d="M170 484 Q60 484 60 300 Q60 140 302 95" fill="none" stroke="var(--text-s)" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)" opacity="0.5"/>
  <text class="ts" x="44" y="310" text-anchor="middle">CO₂</text>
  <text class="ts" x="44" y="326" text-anchor="middle">liberado</text>
</svg>
</div>

<footer>
  Módulo SEAG0211 · Gestión Medioambiental · Energías renovables — biomasa
</footer>
</body>
</html>
